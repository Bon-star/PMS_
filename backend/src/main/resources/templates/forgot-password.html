<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <link rel="stylesheet" href="/css/auth.css">
</head>

<body>
    <div class="auth-wrapper">
        <div class="login-container">
            <div class="login-form-side">
                <h3 class="text-center mb-4">FORGOT PASSWORD</h3>
                <div th:if="${error}" class="alert alert-danger text-center p-2" style="font-size: 14px;"
                    th:text="${error}"></div>
                <p class="text-muted text-center mb-4" style="font-size: 14px;">Enter your email to receive a verification code.</p>
                <form action="/acc/forgot" method="post">
                    <div class="input-group-custom">
                        <i class="fas fa-envelope input-icon"></i>
                        <input type="email" name="email" class="form-control-custom" placeholder="Registered email"
                            required>
                    </div>
                    <button type="submit" class="btn-login">Send OTP</button>
                    <div class="text-center mt-3">
                        <a href="/acc/log" class="text-primary text-decoration-none" style="font-size: 14px;"><i
                                class="fas fa-arrow-left"></i> Back to login</a>
                    </div>
                </form>
            </div>
            <div class="login-banner-side">
                <i class="fas fa-key mb-3" style="font-size: 50px;"></i>
                <h4>ACCOUNT RECOVERY</h4>
                <p class="mt-3 text-white-50">Don't worry, we'll help you regain access.</p>
            </div>
        </div>
    </div>
    <script src="/js/ui-transitions.js"></script>
</body>

</html>
