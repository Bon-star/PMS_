<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
	<link rel="stylesheet" href="/css/auth.css">

</head>

<body>

	<div class="auth-wrapper">
		<div class="login-container">
			<div class="login-form-side">
				<h3 class="text-center mb-4">ĐĂNG NHẬP</h3>

				<div th:if="${error}" class="alert alert-danger text-center p-2" style="font-size: 14px;"
					th:text="${error}"></div>
				<div th:if="${success}" class="alert alert-success text-center p-2" style="font-size: 14px;"
					th:text="${success}"></div>

				<form action="/acc/ck" method="post" class="mt-2">
					<div class="input-group-custom">
						<i class="fas fa-envelope input-icon"></i> <input type="email" name="email"
							class="form-control-custom" placeholder="Email" th:value="${email}" required>
					</div>

					<div class="input-group-custom">
						<i class="fas fa-lock input-icon"></i> <input type="password" name="password" id="password"
							class="form-control-custom" placeholder="Mật khẩu" th:value="${password}" required> <span
							class="toggle-password" onclick="togglePass()"><i class="fas fa-eye-slash"
								id="eyeIcon"></i></span>
					</div>

					<div class="d-flex justify-content-end" style="font-size: 14px;">
						<a href="/acc/forgot" class="text-primary text-decoration-none">Quên
							mật khẩu?</a>
					</div>

					<button type="submit" class="btn-login">Đăng Nhập</button>
				</form>
			</div>

			<div class="login-banner-side">

				<i class="fas fa-user-times mb-3" style="font-size: 50px;"></i>
				<h4>CHƯA CÓ TÀI KHOẢN PMS?</h4>
				<p class="mt-3 text-white-50">Nhấn đăng ký nếu bạn chưa có tài khoản.</p>
				<a href="/acc/reg" class="btn-outline-light-custom">Đăng Ký</a>
			</div>
		</div>
	</div>

	<script src="/js/ui-transitions.js"></script>
</body>

</html>
