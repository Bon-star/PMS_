<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <link rel="stylesheet" href="/css/auth.css">
</head>
</head>

<body>
    <div class="auth-wrapper">
        <div class="login-container">
            <div class="login-form-side">
                <h3 class="text-center mb-4">ĐẶT MẬT KHẨU MỚI</h3>
                <div th:if="${error}" class="alert alert-danger text-center p-2" style="font-size: 14px;"
                    th:text="${error}"></div>

                <form action="/acc/reset-pass" method="post">
                    <div class="input-group-custom">
                        <i class="fas fa-lock input-icon"></i>
                        <input type="password" name="password" id="pass1" class="form-control-custom"
                            placeholder="Mật khẩu mới" required>
                        <span class="toggle-password" onclick="toggleRegPass('pass1', 'eye1')"><i
                                class="fas fa-eye-slash" id="eye1"></i></span>
                    </div>

                    <div class="input-group-custom">
                        <i class="fas fa-check-circle input-icon"></i>
                        <input type="password" name="repassword" id="pass2" class="form-control-custom"
                            placeholder="Nhập lại mật khẩu" required>
                        <span class="toggle-password" onclick="toggleRegPass('pass2', 'eye2')"><i
                                class="fas fa-eye-slash" id="eye2"></i></span>
                    </div>

                    <button type="submit" class="btn-login">Đổi Mật Khẩu</button>
                </form>
            </div>
            <div class="login-banner-side">
                <i class="fas fa-shield-alt mb-3" style="font-size: 50px;"></i>
                <h4>BẢO MẬT TÀI KHOẢN</h4>
                <p class="mt-3 text-white-50">Hãy đặt một mật khẩu mạnh để bảo vệ tài khoản của bạn an toàn hơn.</p>
            </div>
        </div>
    </div>

    <script src="/js/ui-transitions.js"></script>
</body>

</html>
