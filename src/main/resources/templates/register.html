<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <link rel="stylesheet" href="/css/auth.css">
</head>

<body>
    <div class="auth-wrapper">
        <div class="login-container">
            <div class="banner-side">
                <i class="fas fa-user-check mb-3" style="font-size: 50px;"></i>
                <h4>ALREADY HAVE AN ACCOUNT?</h4>
                <p class="mt-3 text-white-50">Go to the login page</p>
                <a href="/acc/log" class="btn-outline-light-custom">Login</a>
            </div>

            <div class="form-side">
                <h3 class="text-center mb-4">REGISTER</h3>

                <div th:if="${error}" class="alert alert-danger text-center p-2" style="font-size: 13px;"
                    th:text="${error}"></div>

                <form action="/acc/register" method="post">
                    <div class="input-group-custom">
                        <i class="fas fa-envelope input-icon"></i>
                        <input type="email" name="email" class="form-control-custom" placeholder="Email"
                            th:value="${email}" required>
                    </div>

                    <div class="input-group-custom">
                        <i class="fas fa-phone input-icon"></i>
                        <input type="text" name="phone" id="phone" class="form-control-custom" placeholder="Phone number"
                            th:value="${phone}" required>
                    </div>

                    <div class="input-group-custom">
                        <i class="fas fa-lock input-icon"></i>
                        <input type="password" name="password" id="pass1" class="form-control-custom" placeholder="Password"
                            required>
                        <span class="toggle-password" onclick="toggleRegPass('pass1', 'eye1')"><i
                                class="fas fa-eye-slash" id="eye1"></i></span>
                    </div>

                    <div class="input-group-custom">
                        <i class="fas fa-check-circle input-icon"></i>
                        <input type="password" name="repassword" id="pass2" class="form-control-custom"
                            placeholder="Confirm password" required>
                        <span class="toggle-password" onclick="toggleRegPass('pass2', 'eye2')"><i
                                class="fas fa-eye-slash" id="eye2"></i></span>
                    </div>

                    <button type="submit" class="btn-register">Register & Get OTP</button>
                </form>
            </div>
        </div>
    </div>

    <script src="/js/ui-transitions.js"></script>
</body>

</html>
