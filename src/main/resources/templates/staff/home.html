<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="utf-8" />
    <title>Home</title>
    <style>
        body {
            background: #f6f8fa;
            font-family: Arial, sans-serif;
        }

        .container {
            max-width: 900px;
            margin: 80px auto;
            padding: 30px;
            background: white;
            border-radius: 8px;
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.08);
        }

        .top {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .greet {
            font-size: 20px;
            font-weight: 600;
        }

        .btn-logout {
            background: #e74c3c;
            color: white;
            border: none;
            padding: 8px 12px;
            border-radius: 6px;
            cursor: pointer;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="top">
            <div>
                <div class="greet">Xin chào, <span th:text="${staffName} ?: 'Nhân viên'">Nhân viên</span></div>
                <div style="font-size:13px; color:#666; margin-top:6px;">Chào mừng bạn đến với hệ thống</div>
            </div>
            <div>
                <form action="/acc/logout" method="get">
                    <button type="submit" class="btn-logout">Đăng xuất</button>
                </form>
            </div>
        </div>

        <hr style="margin:18px 0">

        <p>Trang này dùng để kiểm tra tên nhân viên đã đăng nhập và chức năng đăng xuất.</p>
    </div>
</body>

</html>
