<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Staff • Class Management</title>
    <link rel="stylesheet" href="/backoffice.css" />
    <script src="/js/backoffice-layout.js" defer></script>
</head>
<body class="backoffice-body staff-classroom-page">
    <div class="backoffice-shell">
        <div th:replace="~{staff/layout/header :: sidebar('classrooms')}"></div>
        <div class="backoffice-main">
            <div th:replace="~{staff/layout/header :: topbar('Class Management')}"></div>
            <main class="backoffice-content">
                <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>
                <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>

                <section class="page-section panel">
                    <div style="display:flex;justify-content:space-between;align-items:center;gap:12px;">
                        <div>
                            <h2 class="panel-title">Classes</h2>
                            <p class="meta">Manage academic classes used across the system.</p>
                        </div>
                        <div class="inline-actions">
                            <form method="post" action="/staff/classrooms/create" style="display:flex;gap:10px;align-items:center;">
                                <input name="className" placeholder="New class e.g. SE1701" class="inline-input" required />
                                <input name="courseYear" placeholder="e.g. 2023-2027" style="min-width:130px;" />
                                <button type="submit" class="btn btn-primary">Create</button>
                            </form>
                        </div>
                    </div>

                    <div class="table-wrap" style="margin-top:14px;">
                        <table class="data-table">
                            <thead>
                                <tr>
                                    <th style="width:6%">#</th>
                                    <th style="width:40%">Class Name</th>
                                    <th style="width:28%">Course Year</th>
                                    <th style="width:26%">Actions</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="c,iterStat : ${classes}" class="clickable-row" th:onclick="|window.location='@{/staff/classrooms/{id}(id=${c.classId})}'|">
                                    <td th:text="${iterStat.count}"></td>
                                    <td>
                                        <a th:href="@{/staff/classrooms/{id}(id=${c.classId})}" style="text-decoration:none;color:inherit;"><strong th:text="${c.className}"></strong></a>
                                        <div class="meta" style="margin-top:6px;color:var(--bo-subtext);font-size:13px;" th:if="${c.courseYear != null and !#strings.isEmpty(c.courseYear)}">Course: <span th:text="${c.courseYear}"></span></div>
                                    </td>
                                    <td th:text="${c.courseYear} ?: '-'" class="muted"></td>
                                    <td>
                                        <div class="inline-actions">
                                            <form method="post" th:action="@{/staff/classrooms/update}" style="display:flex;gap:8px;align-items:center;">
                                                <input type="hidden" name="classId" th:value="${c.classId}" />
                                                <input type="text" name="className" th:value="${c.className}" required style="min-width:160px;" />
                                                <input type="text" name="courseYear" th:value="${c.courseYear}" style="min-width:120px;" />
                                                <button type="submit" class="btn btn-small">Save</button>
                                            </form>
                                            <form method="post" th:action="@{/staff/classrooms/delete}" style="display:inline-block;margin-left:6px;">
                                                <input type="hidden" name="classId" th:value="${c.classId}" />
                                                <button type="submit" class="btn btn-soft-danger btn-small" onclick="return confirm('Delete this class?');">Delete</button>
                                            </form>
                                        </div>
                                    </td>
                                </tr>
                                <tr th:if="${#lists.isEmpty(classes)}">
                                    <td colspan="4" class="empty-state">No classes available.</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </section>

                <section class="page-section panel">
                    <h2 class="panel-title">Create New Class</h2>
                    <p class="meta">Add a new academic class for students and projects.</p>
                    <form method="post" action="/staff/classrooms/create">
                        <div class="form-grid">
                            <div>
                                <label for="className">Class Name</label>
                                <input id="className" name="className" type="text" maxlength="50" th:value="${inputClassName}" placeholder="e.g. SE1701" required />
                            </div>
                            <div>
                                <label for="courseYear">Course Year</label>
                                <input id="courseYear" name="courseYear" type="text" maxlength="20" th:value="${inputCourseYear}" placeholder="e.g. 2023-2027" />
                            </div>
                        </div>
                        <div class="form-actions">
                            <button type="submit" class="btn btn-primary">Create Class</button>
                        </div>
                    </form>
                </section>
            </main>
            <div th:replace="~{staff/layout/footer :: pageFooter}"></div>
        </div>
    </div>
</body>
</html>
