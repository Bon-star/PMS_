<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="utf-8" />
    <title>Tạo nhóm mới</title>
    <link rel="stylesheet" href="/student.css" />
</head>

<body class="student-group-page student-group-create-page">
    <div th:replace="~{student/home/header :: sidebar('group')}"></div>

    <div class="main-content">
        <div th:replace="~{student/home/header :: topbar('Tạo nhóm mới')}"></div>

        <div class="content">
            <div class="form-container">
                <div class="form-title">Tạo nhóm mới</div>
                <div th:if="${error}" class="alert alert-error" th:text="${error}">Lỗi</div>

                <form method="post" th:action="@{/student/group/create}">
                    <div class="form-group">
                        <label class="form-label" for="groupName">Tên nhóm <span style="color:#e74c3c;">*</span></label>
                        <input type="text" id="groupName" name="groupName" class="form-input"
                            placeholder="Nhập tên nhóm (VD: DX-TD-HH)" required />
                        <div class="form-hint">Mỗi học kỳ, mỗi sinh viên chỉ được tạo/tham gia tối đa 1 nhóm.</div>
                    </div>
                    <div class="form-actions">
                        <button type="submit" class="btn-submit">Tạo nhóm</button>
                        <a href="/student/group/list" class="btn-cancel">Hủy</a>
                    </div>
                </form>
            </div>
        </div>
        <div th:replace="~{student/home/footer :: pageFooter}"></div>
    </div>
</body>

</html>
