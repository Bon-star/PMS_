<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Student - Create group</title>
    <link rel="stylesheet" href="/backoffice.css" />
    <link rel="stylesheet" href="/student-backoffice.css" />
    <script src="/js/backoffice-layout.js" defer></script>
</head>
<body class="backoffice-body student-group-page student-group-create-page">
    <div class="backoffice-shell">
        <div th:replace="~{student/layout/header :: sidebar('group')}"></div>
        <div class="backoffice-main">
            <div th:replace="~{student/layout/header :: topbar('Create a new group')}"></div>
            <main class="backoffice-content">
                <section class="page-section panel">
                    <h2 class="panel-title">Create a new group</h2>
                    <div th:if="${error}" class="alert alert-error" th:text="${error}">Error</div>

                    <form method="post" th:action="@{/student/group/create}">
                        <div class="form-grid">
                            <div class="full">
                                <label for="groupName">Group name <span style="color:#dc2626;">*</span></label>
                                <input type="text" id="groupName" name="groupName"
                                    placeholder="Enter group name (e.g., DX-TD-HH)" required />
                                <div class="hint">Each semester, each student can create/join at most one group.</div>
                            </div>
                        </div>
                        <div class="form-actions">
                            <button type="submit" class="btn btn-primary">Create group</button>
                            <a href="/student/group/list" class="btn btn-secondary">Cancel</a>
                        </div>
                    </form>
                </section>
            </main>
            <div th:replace="~{student/layout/footer :: pageFooter}"></div>
        </div>
    </div>
</body>
</html>
