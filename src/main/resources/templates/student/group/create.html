<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="utf-8" />
    <title>Tạo nhóm mới</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #f6f8fa; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; height: 100vh; }
        .sidebar { width: 260px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 20px; }
        .sidebar-logo { font-size: 22px; font-weight: bold; margin-bottom: 30px; padding-bottom: 15px; border-bottom: 2px solid rgba(255,255,255,0.2); }
        .nav-link { display: block; padding: 12px 15px; color: white; text-decoration: none; border-radius: 6px; background: rgba(255,255,255,0.25); }
        .main-content { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        .header { background: white; padding: 15px 30px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); display: flex; justify-content: space-between; align-items: center; }
        .header-left { font-size: 24px; font-weight: 600; color: #333; }
        .header-actions { display: flex; align-items: center; gap: 10px; }
        .notify-btn { text-decoration: none; background: #f0f4ff; border: 1px solid #c9d5ff; color: #27408b; padding: 8px 12px; border-radius: 6px; font-size: 13px; font-weight: 600; }
        .notify-btn.disabled { background: #f5f5f5; border-color: #ddd; color: #999; pointer-events: none; }
        .user-info { display: flex; align-items: center; gap: 10px; }
        .user-avatar img { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; }
        .user-text .user-name { font-size: 14px; font-weight: 600; color: #333; }
        .user-text .user-role { font-size: 12px; color: #999; }
        .logout-btn { background: #e74c3c; color: white; border: none; padding: 8px 16px; border-radius: 6px; cursor: pointer; font-size: 14px; }
        .content { flex: 1; overflow-y: auto; padding: 30px; }
        .form-container { max-width: 500px; background: white; padding: 30px; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
        .form-title { font-size: 24px; font-weight: 600; color: #333; margin-bottom: 20px; }
        .form-group { margin-bottom: 20px; }
        .form-label { display: block; font-size: 14px; font-weight: 600; color: #333; margin-bottom: 8px; }
        .form-input { width: 100%; padding: 12px; font-size: 14px; border: 1px solid #ddd; border-radius: 6px; font-family: inherit; }
        .form-actions { display: flex; gap: 10px; margin-top: 30px; }
        .btn-submit { flex: 1; background: #667eea; color: white; border: none; padding: 12px; border-radius: 6px; cursor: pointer; font-size: 14px; font-weight: 600; }
        .btn-cancel { flex: 1; background: #ecf0f1; color: #333; border: none; padding: 12px; border-radius: 6px; cursor: pointer; font-size: 14px; font-weight: 600; text-decoration: none; text-align: center; }
        .alert { padding: 12px; border-radius: 6px; margin-bottom: 20px; font-size: 14px; }
        .alert-error { background: #fadbd8; color: #c0392b; border: 1px solid #e74c3c; }
        .form-hint { font-size: 13px; color: #666; margin-top: 5px; }
    </style>
</head>

<body>
    <div class="sidebar">
        <div class="sidebar-logo" th:text="${className} ?: 'PMS'">PMS</div>
        <a href="/student/group/list" class="nav-link">Nhóm của tôi</a>
    </div>

    <div class="main-content">
        <div class="header">
            <div class="header-left">Tạo nhóm mới</div>
            <div class="header-actions">
                <a th:if="${invitationFeatureEnabled}" class="notify-btn" href="/student/group/notifications">
                    Thông báo <span th:if="${notificationCount > 0}" th:text="'(' + ${notificationCount} + ')'"></span>
                </a>
                <span th:unless="${invitationFeatureEnabled}" class="notify-btn disabled">Thông báo (chưa bật)</span>
                <div class="user-info">
                    <div class="user-avatar"><img src="/img/user.png" alt="Avatar" /></div>
                    <div class="user-text">
                        <div class="user-name" th:text="${studentName} ?: 'Học sinh'">Học sinh</div>
                        <div class="user-role" th:text="${userRole} ?: 'Học sinh'">Học sinh</div>
                    </div>
                </div>
                <form action="/acc/logout" method="get"><button type="submit" class="logout-btn">Đăng xuất</button></form>
            </div>
        </div>

        <div class="content">
            <div class="form-container">
                <div class="form-title">Tạo nhóm mới</div>
                <div th:if="${error}" class="alert alert-error" th:text="${error}">Lỗi</div>

                <form method="post" th:action="@{/student/group/create}">
                    <div class="form-group">
                        <label class="form-label" for="groupName">Tên nhóm <span style="color:#e74c3c;">*</span></label>
                        <input type="text" id="groupName" name="groupName" class="form-input"
                            placeholder="Nhập tên nhóm (VD: DX-TD-HH)" required />
                        <div class="form-hint">Mỗi học kỳ, mỗi sinh viên chỉ được tạo/tham gia tối đa 1 nhóm.</div>
                    </div>
                    <div class="form-actions">
                        <button type="submit" class="btn-submit">Tạo nhóm</button>
                        <a href="/student/group/list" class="btn-cancel">Hủy</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</body>

</html>
