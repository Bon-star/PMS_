<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
    <div th:fragment="sidebar(activeMenu)" class="backoffice-sidebar">
        <div class="sidebar-brand">
            <div class="sidebar-brand-copy">
                <div class="sidebar-brand-title">PMS</div>
                <div class="sidebar-brand-subtitle">Khu vực giảng viên</div>
            </div>
            <button type="button" class="sidebar-toggle" onclick="toggleBackofficeSidebar()" aria-label="Thu gọn thanh bên">☰</button>
        </div>

        <nav class="sidebar-nav">
            <a class="sidebar-link" th:classappend="${activeMenu == 'home'} ? ' active'" href="/lecturer/home">
                <span class="sidebar-icon">🏠</span>
                <span class="sidebar-text">Trang chủ</span>
            </a>
            <a class="sidebar-link" th:classappend="${activeMenu == 'projects'} ? ' active'" href="/lecturer/projects">
                <span class="sidebar-icon">✅</span>
                <span class="sidebar-text">Duyệt project</span>
            </a>
        </nav>

        <div class="sidebar-footer">
            Giảng viên duyệt project, theo dõi tiến độ làm việc của nhóm và để lại bình luận cho học viên.
        </div>
    </div>

    <header th:fragment="topbar(pageTitle)" class="backoffice-topbar">
        <div>
            <h1 class="topbar-title" th:text="${pageTitle}">Trang</h1>
            <div class="topbar-subtitle">Theo dõi tiến độ project, sprint và chất lượng thực hiện công việc.</div>
        </div>
        <div class="topbar-user">
            <div class="topbar-avatar"><img src="/img/user.png" alt="Avatar" /></div>
            <div>
                <div class="topbar-user-name" th:text="${displayName} ?: 'Giảng viên'">Giảng viên</div>
                <div class="topbar-user-role" th:text="${displayRole} ?: 'Giảng viên'">Giảng viên</div>
            </div>
            <form action="/acc/logout" method="get">
                <button type="submit" class="btn btn-danger">Đăng xuất</button>
            </form>
        </div>
    </header>
</body>
</html>
